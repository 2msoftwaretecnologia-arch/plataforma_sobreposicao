{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel Administrativo{% endblock %}</title>
    <link rel="stylesheet" type="text/css" href="{% static 'control_panel/css/dashboard.css' %}">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Painel Administrativo</span>
            </div>
            <nav class="sidebar-nav">
                <a class="sidebar-link {% if active_nav == 'armazenamento' %}active{% endif %}"
                   href="{% url 'control_panel:armazenamento' %}">
                    <span class="sidebar-icon">🗄️</span>
                    Armazenamento
                </a>
                <a class="sidebar-link {% if active_nav == 'usuarios' %}active{% endif %}"
                   href="{% url 'control_panel:usuarios' %}">
                    <span class="sidebar-icon">👤</span>
                    Usuários
                </a>
            </nav>
            <div class="sidebar-footer">
                <span class="sidebar-user">{{ user.username }}</span>
                <form method="post" action="{% url 'authentication:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="sidebar-logout">Sair</button>
                </form>
            </div>
        </aside>

        <main class="dashboard-content">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>

</html>
